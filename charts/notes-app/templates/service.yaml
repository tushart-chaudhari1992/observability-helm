---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.appNameSpace }}
  labels:
    app: {{ .Values.appName }}
spec:
  type: {{ .Values.serviceType }} 
  selector:
    app: {{ .Values.appName }}
  ports:
  - name: {{ .Values.appName }}
    protocol: TCP
    port: {{ .Values.servicePort }}         # The port exposed inside the cluster
    targetPort: {{ .Values.containerPort }} # The port mapped down to the containerPort above
    nodePort: {{ .Values.nodePort }}
  - name: {{ .Values.appMonitor }}
    protocol: TCP
    port: {{ .Values.monitorPort }}     
