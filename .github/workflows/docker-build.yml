name: Build and Push Docker Image

# Trigger the workflow on pushes to the main branch or when a semantic version tag is created
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (enables advanced build features like caching)
      - name: Set up Docker Buildx
        uses: actions/checkout@v4 # Note: Using standard buildx setup
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to Docker Hub (skipped on Pull Requests)
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets::DOCKERHUB_USERNAME }}
          password: ${{ secrets::DOCKERHUB_TOKEN }}

      # Step 4: Extract metadata (tags, labels) for Docker
      # This automatically handles tagging your image as 'latest' on main branch,
      # or matching your git tags (e.g., v1.0.0) if a release is pushed.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/notes-app
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Step 5: Build and Push the Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enables GitHub Actions caching to speed up subsequent builds drastically
          cache-from: type=gha
          cache-to: type=gha,mode=max